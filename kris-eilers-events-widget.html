<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upcoming Events — Kris Eilers Campaign</title>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:transparent;font-family:'Roboto',sans-serif}
body{padding:12px;display:flex;align-items:flex-start;justify-content:center}
.wrap{background:#fff;border:1px solid #dadce0;border-radius:12px;overflow:hidden;width:100%;max-width:520px}
.head{display:flex;align-items:center;gap:10px;padding:16px 20px;border-bottom:1px solid #e8eaed}
.head-icon{width:30px;height:30px;background:#fce8e6;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.head-icon svg{width:16px;height:16px}
.head-title{font-family:'Google Sans',sans-serif;font-size:15px;font-weight:500;color:#202124}
.loading{padding:24px 20px;text-align:center;font-size:13px;color:#9aa0a6}
.error-msg{padding:16px 20px;font-size:13px;color:#c5221f;background:#fce8e6;line-height:1.6}
.empty{padding:20px;text-align:center;font-size:13px;color:#9aa0a6}
.event-list{padding:0 4px}
.event-row{display:flex;align-items:flex-start;gap:16px;padding:14px 16px;border-bottom:1px solid #f1f3f4}
.event-row:last-child{border-bottom:none}
.event-cal{text-align:center;width:38px;flex-shrink:0}
.event-month{font-size:10px;font-weight:500;text-transform:uppercase;color:#d93025;letter-spacing:.05em;line-height:1}
.event-day{font-family:'Google Sans',sans-serif;font-size:24px;color:#202124;line-height:1.1;font-weight:400}
.event-body{flex:1;min-width:0}
.event-title{font-size:14px;font-weight:500;color:#202124;margin-bottom:3px;line-height:1.3}
.event-meta{font-size:12px;color:#5f6368;line-height:1.4}
.pill{font-size:11px;font-weight:500;border-radius:10px;padding:2px 9px;margin-left:7px;vertical-align:middle;white-space:nowrap;display:inline-block}
.pill-canvass{background:#e8f5ee;color:#1e6b3c}
.pill-meeting{background:#f3e8fd;color:#8430ce}
.pill-community{background:#fef7e0;color:#b46000}
.pill-phone{background:#e8f0fe;color:#1a73e8}
.pill-fundraiser{background:#fce8e6;color:#c5221f}
.pill-other{background:#f1f3f4;color:#5f6368}
.footer{padding:10px 20px 14px;border-top:1px solid #f1f3f4;font-size:12px;color:#9aa0a6;display:flex;align-items:center;justify-content:space-between}
.refresh-btn{font-size:12px;font-weight:500;color:#1a73e8;background:none;border:none;cursor:pointer;font-family:inherit;padding:0}
.refresh-btn:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div class="head-icon">
      <svg fill="none" stroke="#d93025" stroke-width="2" viewBox="0 0 16 16"><rect x="1" y="2" width="14" height="13" rx="1"/><path d="M1 6h14M5 1v2M11 1v2"/></svg>
    </div>
    <div class="head-title">Upcoming events</div>
  </div>
  <div id="event-container"><div class="loading">Loading events...</div></div>
  <div class="footer">
    <span id="last-updated"></span>
    <button class="refresh-btn" onclick="loadEvents()">Refresh</button>
  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxD0KEubWihbcmYR-IXFnuexbE6XYGa2xahdm6WlCFPDlHEtQTSFGrdNp63UD7n74r1/exec';
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function getPillClass(title) {
  const t = title.toLowerCase();
  if(t.includes('canvass')) return 'pill-canvass';
  if(t.includes('meeting')||t.includes('zoom')||t.includes('call')) return 'pill-meeting';
  if(t.includes('phone')||t.includes('bank')) return 'pill-phone';
  if(t.includes('fundrais')||t.includes('donor')) return 'pill-fundraiser';
  if(t.includes('community')||t.includes('listen')||t.includes('forum')) return 'pill-community';
  return 'pill-other';
}
function getPillLabel(title) {
  const t = title.toLowerCase();
  if(t.includes('canvass')) return 'Canvass';
  if(t.includes('zoom')) return 'Zoom';
  if(t.includes('call')) return 'Call';
  if(t.includes('meeting')) return 'Meeting';
  if(t.includes('phone')||t.includes('bank')) return 'Phone bank';
  if(t.includes('fundrais')||t.includes('donor')) return 'Fundraiser';
  if(t.includes('community')||t.includes('listen')) return 'Community';
  return 'Event';
}
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function formatTime(isoStr) {
  const d = new Date(isoStr);
  let h = d.getHours(), m = d.getMinutes();
  const ampm = h >= 12 ? 'pm' : 'am';
  h = h % 12 || 12;
  return m === 0 ? `${h} ${ampm}` : `${h}:${String(m).padStart(2,'0')} ${ampm}`;
}

async function loadEvents() {
  const el = document.getElementById('event-container');
  try {
    const res = await fetch(SCRIPT_URL + '?action=events', {cache:'no-store'});
    const data = await res.json();
    if(data.error) throw new Error(data.error);
    const events = data.events || [];
    if(events.length === 0) {
      el.innerHTML = '<div class="empty">No upcoming events. Add events to the campaign Google Calendar and they will appear here automatically.</div>';
      document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
      return;
    }
    el.innerHTML = '<div class="event-list">' + events.map(e => {
      const dateObj = new Date(e.start);
      const month = MONTHS[dateObj.getMonth()];
      const day = dateObj.getDate();
      const dayName = DAYS[dateObj.getDay()];
      const timeStr = e.allDay ? '' : formatTime(e.start);
      const meta = [dayName, timeStr, e.location].filter(Boolean).join(' — ');
      return `<div class="event-row">
        <div class="event-cal">
          <div class="event-month">${month}</div>
          <div class="event-day">${day}</div>
        </div>
        <div class="event-body">
          <div class="event-title">${esc(e.title)}<span class="pill ${getPillClass(e.title)}">${getPillLabel(e.title)}</span></div>
          <div class="event-meta">${esc(meta)}</div>
        </div>
      </div>`;
    }).join('') + '</div>';
    document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  } catch(err) {
    el.innerHTML = '<div class="error-msg">Could not load events. Make sure the Apps Script is redeployed after updating the script code.</div>';
  }
}

loadEvents();
setInterval(loadEvents, 300000);
</script>
</body>
</html>
